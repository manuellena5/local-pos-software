<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

    /* Header */
    #header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    #header h1 { font-size: 1.1rem; font-weight: 700; }
    #header p  { font-size: .75rem; color: #888; margin-top: 2px; }

    /* Search + filters */
    #controls { background: #fff; padding: 12px 16px; border-bottom: 1px solid #e5e5e5; display: flex; flex-direction: column; gap: 10px; }
    #search-input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; outline: none; }
    #search-input:focus { border-color: #4f46e5; }
    #categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    #categories::-webkit-scrollbar { display: none; }
    .cat-pill { flex-shrink: 0; padding: 5px 14px; border-radius: 999px; border: 1px solid #ddd; background: #fff; font-size: .8rem; cursor: pointer; transition: all .15s; }
    .cat-pill.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    /* Grid */
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 16px; }
    @media (min-width: 480px) { #grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }

    /* Card */
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f0f0f0; }
    .card-img-placeholder { width: 100%; aspect-ratio: 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #ccc; }
    .card-body { padding: 10px; }
    .card-name { font-size: .85rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-price { font-size: .9rem; font-weight: 700; color: #4f46e5; }
    .card-code { font-size: .7rem; color: #aaa; margin-top: 2px; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: .68rem; font-weight: 600; margin-top: 4px; }
    .badge-ok  { background: #d1fae5; color: #065f46; }
    .badge-low { background: #fef3c7; color: #92400e; }
    .badge-out { background: #fee2e2; color: #991b1b; }

    /* Empty state */
    #empty { text-align: center; padding: 60px 20px; color: #888; }
    #empty p { font-size: .9rem; }

    /* Modal */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
    #modal-overlay.open { display: flex; }
    @media (min-width: 600px) { #modal-overlay { align-items: center; } }
    #modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 20px 18px 32px; position: relative; }
    @media (min-width: 600px) { #modal { border-radius: 16px; } }
    #modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #888; }
    #modal-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; background: #f0f0f0; margin-bottom: 14px; }
    #modal-name  { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    #modal-code  { font-size: .75rem; color: #aaa; margin-bottom: 8px; }
    #modal-price { font-size: 1.3rem; font-weight: 800; color: #4f46e5; margin-bottom: 8px; }
    #modal-desc  { font-size: .85rem; color: #555; line-height: 1.6; margin-bottom: 12px; }
    #modal-attrs { margin-bottom: 16px; }
    #modal-attrs table { width: 100%; border-collapse: collapse; }
    #modal-attrs td { padding: 5px 0; font-size: .82rem; border-bottom: 1px solid #f0f0f0; }
    #modal-attrs td:first-child { color: #888; width: 45%; }
    #modal-attrs td:last-child  { font-weight: 500; }
    #btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: #25d366; color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; text-decoration: none; }
    #btn-whatsapp:hover { background: #1ebe57; }

    /* Loading */
    #loading { text-align: center; padding: 60px 20px; color: #888; font-size: .9rem; }

    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e5e5e5; border-top-color: #4f46e5; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <h1 id="biz-name">Catálogo</h1>
  <p id="biz-sub">Cargando...</p>
</div>

<div id="controls">
  <input id="search-input" type="search" placeholder="Buscar productos..." />
  <div id="categories"></div>
</div>

<div id="loading"><div class="spinner"></div><br>Cargando catálogo...</div>
<div id="grid" style="display:none"></div>
<div id="empty" style="display:none"><p>No se encontraron productos.</p></div>

<!-- Modal de detalle -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="Cerrar">&times;</button>
    <img id="modal-img" src="" alt="" style="display:none" />
    <div id="modal-img-placeholder" class="card-img-placeholder" style="display:none">📦</div>
    <div id="modal-name"></div>
    <div id="modal-code"></div>
    <div id="modal-price"></div>
    <div id="modal-badge"></div>
    <div id="modal-desc"></div>
    <div id="modal-attrs"></div>
    <a id="btn-whatsapp" href="#" target="_blank" rel="noopener" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Encargar por WhatsApp
    </a>
  </div>
</div>

<script>
  const API = window.location.origin;
  let allProducts = [];
  let config = {};
  let activeCategory = '';

  function fmt(n) {
    return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }).format(n);
  }

  function badgeHtml(status) {
    const map = { ok: ['badge-ok','Disponible'], low: ['badge-low','Últimas unidades'], out: ['badge-out','Sin stock'] };
    const [cls, txt] = map[status] || ['badge-ok','Disponible'];
    return `<span class="badge ${cls}">${txt}</span>`;
  }

  async function loadConfig() {
    try {
      const r = await fetch(`${API}/api/public/config`);
      const j = await r.json();
      if (j.data) {
        config = j.data;
        document.getElementById('biz-name').textContent = config.businessName || 'Catálogo';
        document.title = config.businessName || 'Catálogo';
        document.getElementById('biz-sub').textContent = 'Catálogo de productos';
      }
    } catch {}
  }

  async function loadProducts(buId) {
    const params = new URLSearchParams(window.location.search);
    const search = params.get('q') || '';
    const url = `${API}/api/public/catalog/${buId}/products`;
    const r = await fetch(url);
    const j = await r.json();
    return j.data || [];
  }

  function getCategories(products) {
    const set = new Set(products.map(p => p.category).filter(Boolean));
    return ['Todos', ...Array.from(set).sort()];
  }

  function renderCategories(products) {
    const cats = getCategories(products);
    const el = document.getElementById('categories');
    el.innerHTML = cats.map(c => {
      const isActive = (c === 'Todos' && !activeCategory) || c === activeCategory;
      return `<button class="cat-pill${isActive ? ' active' : ''}" data-cat="${c === 'Todos' ? '' : c}">${c}</button>`;
    }).join('');
    el.querySelectorAll('.cat-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        renderCategories(allProducts);
        renderGrid(filterProducts(allProducts));
      });
    });
  }

  function filterProducts(products) {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    return products.filter(p => {
      const matchCat = !activeCategory || p.category === activeCategory;
      const matchQ   = !q || p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q) || (p.code||'').toLowerCase().includes(q);
      return matchCat && matchQ;
    });
  }

  function renderGrid(products) {
    const grid  = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (products.length === 0) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.style.display  = 'grid';
    grid.innerHTML = products.map(p => {
      const imgHtml = p.primaryImage
        ? `<img class="card-img" src="${API}/${p.primaryImage}" alt="${p.name}" loading="lazy" />`
        : `<div class="card-img-placeholder">📦</div>`;
      return `<div class="card" data-id="${p.id}">
        ${imgHtml}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-price">${fmt(p.displayPrice)}</div>
          ${p.code ? `<div class="card-code">Cód: ${p.code}</div>` : ''}
          ${badgeHtml(p.stockStatus)}
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const product = products.find(p => p.id === Number(card.dataset.id));
        if (product) openModal(product);
      });
    });
  }

  function openModal(p) {
    const overlay = document.getElementById('modal-overlay');
    const img     = document.getElementById('modal-img');
    const imgPlaceholder = document.getElementById('modal-img-placeholder');

    if (p.primaryImage) {
      img.src = `${API}/${p.primaryImage}`;
      img.alt = p.name;
      img.style.display = 'block';
      imgPlaceholder.style.display = 'none';
    } else {
      img.style.display = 'none';
      imgPlaceholder.style.display = 'flex';
    }

    document.getElementById('modal-name').textContent  = p.name;
    document.getElementById('modal-code').textContent  = p.code ? `Código: ${p.code}` : '';
    document.getElementById('modal-price').textContent = fmt(p.displayPrice);
    document.getElementById('modal-badge').innerHTML   = badgeHtml(p.stockStatus);
    document.getElementById('modal-desc').textContent  = p.catalogDescription || p.description || '';

    const attrsEl = document.getElementById('modal-attrs');
    if (p.attributes && p.attributes.length > 0) {
      attrsEl.innerHTML = `<table>${p.attributes.map(a => `<tr><td>${a.key}</td><td>${a.value}</td></tr>`).join('')}</table>`;
    } else {
      attrsEl.innerHTML = '';
    }

    const waBtn = document.getElementById('btn-whatsapp');
    if (config.whatsappNumber && p.stockStatus !== 'out') {
      const msg = encodeURIComponent(`Hola! Me interesa: ${p.name} (${fmt(p.displayPrice)}). ¿Tienen disponibilidad?`);
      waBtn.href = `https://wa.me/${config.whatsappNumber}?text=${msg}`;
      waBtn.style.display = 'flex';
    } else {
      waBtn.style.display = 'none';
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.getElementById('search-input').addEventListener('input', () => {
    renderGrid(filterProducts(allProducts));
  });

  async function init() {
    await loadConfig();
    const buId = config.catalogBusinessUnitId;
    if (!buId) {
      document.getElementById('loading').innerHTML = '<p>El catálogo no está configurado aún.</p>';
      return;
    }
    try {
      allProducts = await loadProducts(buId);
      document.getElementById('loading').style.display = 'none';
      renderCategories(allProducts);
      renderGrid(filterProducts(allProducts));
    } catch (err) {
      document.getElementById('loading').innerHTML = '<p>Error al cargar el catálogo.</p>';
    }
  }

  init();
</script>
</body>
</html>
